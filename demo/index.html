<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bubble Spreadsheet Table Demo</title>
    <link rel="stylesheet" href="../vendor/tabulator.min.css">
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
        background: #f3f4f6;
      }

      main {
        max-width: 1100px;
        margin: 24px auto;
        padding: 0 16px;
      }

      #bubble-canvas {
        height: 420px;
        background: #ffffff;
      }

      .demo-actions {
        display: flex;
        gap: 8px;
        margin: 12px 0;
      }

      button {
        border: 1px solid #cbd5e1;
        background: #ffffff;
        color: #0f172a;
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      pre {
        overflow: auto;
        background: #0f172a;
        color: #e5e7eb;
        padding: 12px;
        min-height: 80px;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="bubble-canvas"></div>
      <div class="demo-actions">
        <button id="add-row" type="button">Add row</button>
        <button id="csv" type="button">Build CSV</button>
        <button id="xlsx" type="button">Build XLSX workbook</button>
      </div>
      <pre id="state-output"></pre>
    </main>

    <script src="../vendor/tabulator.min.js"></script>
    <script src="../vendor/xlsx.full.min.js"></script>
    <script src="../src/bubble-table-core.js"></script>
    <script>
      window.__xss = false;

      var canvas = document.getElementById("bubble-canvas");
      var stateOutput = document.getElementById("state-output");
      var states = {};
      var events = [];

      var instance = {
        data: {},
        canvas: {
          0: canvas,
          append: function (node) {
            canvas.appendChild(node);
          },
          get: function () {
            return canvas;
          }
        },
        publishState: function (key, value) {
          states[key] = value;
          stateOutput.textContent = JSON.stringify(states, null, 2);
        },
        triggerEvent: function (key) {
          events.push(key);
        }
      };

      var properties = {
        data_json: JSON.stringify([
          { Name: "Widget", Qty: 2, Note: "Normal text" },
          { Name: "<img src=x onerror='window.__xss=true'>", Qty: 5, Note: "=HYPERLINK(\"https://example.com\")" },
          { Name: "Service", Qty: 1, Note: "+SUM(1,1)" }
        ]),
        columns_json: JSON.stringify([
          { title: "Name", field: "Name", width: 220 },
          { title: "Qty", field: "Qty", hozAlign: "right", width: 90 },
          { title: "Note", field: "Note", width: 360 }
        ]),
        column_defaults_json: "",
        table_height: "420px",
        layout: "fitColumns",
        editable: true,
        pagination: false,
        page_size: 25,
        selectable_rows: true,
        movable_columns: true,
        resizable_columns: true,
        placeholder: "No data",
        safe_export: true,
        sheet_name: "Demo",
        csv_file_name: "demo.csv",
        xlsx_file_name: "demo.xlsx",
        header_background_color: "#e0f2fe",
        header_text_color: "#082f49",
        header_font_weight: 700,
        row_background_color: "#ffffff",
        alternate_row_background_color: "#f8fafc",
        row_hover_background_color: "#eff6ff",
        selected_row_background_color: "#dbeafe",
        text_color: "#111827",
        border_color: "#cbd5e1",
        accent_color: "#0284c7",
        font_size: 14,
        row_height: 36,
        font_family: "Inter, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif",
        border_radius: 10,
        cell_padding_x: 12,
        cell_padding_y: 8,
        toolbar_background_color: "#f0f9ff",
        toolbar_button_background_color: "#ffffff",
        toolbar_button_text_color: "#0f172a",
        toolbar_button_hover_background_color: "#dbeafe",
        toolbar_button_border_color: "#bae6fd",
        toolbar_button_radius: 8,
        toolbar_button_font_size: 13,
        toolbar_gap: 8,
        table_background_color: "#ffffff",
        table_shadow: "0 12px 32px rgba(2, 132, 199, 0.12)",
        style_overrides_json: JSON.stringify({
          tableShadow: "none"
        }),
        debug: true
      };

      window.BubbleSpreadsheetTable.bubble.initialize(instance, {});
      window.BubbleSpreadsheetTable.bubble.update(instance, properties, {});

      document.getElementById("add-row").addEventListener("click", function () {
        instance.data.bst.addRow(JSON.stringify({ Name: "Added", Qty: 3, Note: "@unsafe" }));
      });

      document.getElementById("csv").addEventListener("click", function () {
        stateOutput.textContent = instance.data.bst.csvString(true);
      });

      document.getElementById("xlsx").addEventListener("click", function () {
        var workbook = instance.data.bst.buildXlsxWorkbook("Demo");
        stateOutput.textContent = JSON.stringify(Object.keys(workbook.Sheets), null, 2);
      });

      window.__bubbleTest = {
        instance: instance,
        states: states,
        events: events,
        properties: properties,
        getRows: function () {
          return instance.data.bst.getData();
        },
        getCsv: function () {
          return instance.data.bst.csvString(true);
        },
        hasTabulator: function () {
          return !!window.Tabulator && !!document.querySelector(".tabulator");
        },
        buildWorkbookSheetNames: function () {
          return Object.keys(instance.data.bst.buildXlsxWorkbook("Demo").Sheets);
        }
      };
    </script>
  </body>
</html>
